<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Valentines Wiki - Configuration</title>
    <link rel="stylesheet" href="../css/wiki.css">
  </head>
  <body data-resource="valentines" data-page="configuration" data-depth="1">
    <header class="wiki-header"></header>
    <div class="wiki-shell">
      <aside class="wiki-sidebar"></aside>
      <main class="wiki-main">
        <article class="wiki-content" id="content">
        <h1>Configuration</h1>
        <p>These are original files. If something happened, you can always see the default settings here.</p>
          <h2>Plugin files</h2>
          <div class="file-spoilers">
            <details class="file-spoiler">
              <summary>
                <span class="file-spoiler-path">config.yml</span>
                <span class="file-spoiler-hint" aria-hidden="true">Click to expand</span>
              </summary>
              <div class="file-spoiler-content">
                <div class="file-spoiler-toolbar">
                  <span>YAML</span>
                  <button class="file-copy-button" type="button" data-copy-file="config" disabled>Copy</button>
                </div>
                <pre><code id="config" data-file-src="files/config.yml">Loading file...</code></pre>
              </div>
            </details>

            <details class="file-spoiler">
              <summary>
                <span class="file-spoiler-path">lang/en.yml</span>
                <span class="file-spoiler-hint" aria-hidden="true">Click to expand</span>
              </summary>
              <div class="file-spoiler-content">
                <div class="file-spoiler-toolbar">
                  <span>YAML</span>
                  <button class="file-copy-button" type="button" data-copy-file="language-en" disabled>Copy</button>
                </div>
                <pre><code id="language-en" data-file-src="files/lang/en.yml">Loading file...</code></pre>
              </div>
            </details>
          </div>
        </article>
      </main>
    </div>
    <script src="../js/wiki.js"></script>
  </body>
</html>
