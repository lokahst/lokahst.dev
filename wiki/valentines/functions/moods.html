        <h1>Moods</h1>
        <p>You can set your mood but be aware that your partner will be notified whenever you change it. You can see player's mood in player's profile.</p>

        <h2>Set your mood</h2>
        <p>You can set your mood in <b>Mood</b> menu. Select one of the available moods and your mood will be immediately updated.</p>
