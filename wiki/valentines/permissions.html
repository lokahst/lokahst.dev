<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Valentines wiki - Permissions</title>
    <link rel="stylesheet" href="../css/wiki.css">
  </head>
  <body data-resource="valentines" data-page="permissions" data-depth="1">
    <header class="wiki-header"></header>
    <div class="wiki-shell">
      <aside class="wiki-sidebar"></aside>
      <main class="wiki-main">
        <article class="wiki-content" id="content">
          <h1>Permissions</h1>
          <template data-wiki-table>

Permission | Default | Description
<code>valentines.use</code> | - | Use of main GUI and commands
<code>valentines.effect</code> | - | Use of effects around player
<code>valentines.marry</code> | - | Allows marriage
<code>valentines.divorce</code> | - | Allows divorce
<code>valentines.admin</code> | * | Administrative permission
<code>valentines.reload</code> | * | Allows reloading plugin
<code>valentines.friends.use</code> | - | Use of friends system
<code>valentines.friends.add</code> | - | Allows sending friend requests
<code>valentines.friends.*</code> | * | Allows using whole friends system

</template>
        </article>
      </main>
    </div>
    <script src="../js/wiki.js"></script>
  </body>
</html>
