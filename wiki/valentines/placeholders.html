<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Valentines wiki - Placeholders</title>
    <link rel="stylesheet" href="../css/wiki.css">
  </head>
  <body data-resource="valentines" data-page="placeholders" data-depth="1">
    <header class="wiki-header"></header>
    <div class="wiki-shell">
      <aside class="wiki-sidebar"></aside>
      <main class="wiki-main">
        <article class="wiki-content" id="content">
          <h1>Placeholders</h1>
          <template data-wiki-table>

Placeholder | Description
<code>%valentines_name%</code> | Player name
<code>%valentines_mood%</code> | Formatted player mood
<code>%valentines_mood_raw%</code> | Raw mood value
<code>%valentines_hugs%</code> | Hugs received
<code>%valentines_hugs_received%</code> | Hugs received
<code>%valentines_hugs_given%</code> | Hugs given
<code>%valentines_kisses%</code> | Kisses received
<code>%valentines_kisses_received%</code> | Kisses received
<code>%valentines_kisses_given%</code> | Kisses given
<code>%valentines_likes%</code> | Likes received
<code>%valentines_likes_received%</code> | Likes received
<code>%valentines_likes_given%</code> | Likes given

<code>%valentines_total_given%</code> | Total interactions given
<code>%valentines_total_received%</code> | Total interactions received
<code>%valentines_total_score%</code> | Total social score
<code>%valentines_is_married%</code> | Returns "true" or "false"
<code>%valentines_partner%</code> | Partner's name
<code>%valentines_days_married%</code> | Days married
<code>%valentines_relationship_status%</code> | Current rs status
<code>%valentines_is_engaged%</code> | Returns "true" or "false"
<code>%valentines_engaged_with%</code> | Name of the engaged player
<code>%valentines_engagement_days%</code> | Days since engagement
<code>%valentines_engagement_hours%</code> | Hours since engagement

<code>%valentines_achievements_unlocked%</code> | Number of unlocked achievements
<code>%valentines_achievements_total%</code> | Total available achievements
<code>%valentines_achievements_remaining%</code> | Remaining achievements
<code>%valentines_achievements_progress%</code> | Completion percentage

<code>%valentines_has_achievement_(achievement)</code> | Check specific unlocked achievement
<code>%valentines_has_achievement_first_hug</code> | Example - returns true or false

<code>%valentines_top_name_(position)</code> | Displays Top 1-100 player
<code>%valentines_top_score_(position)</code> | Displays Top 1-100 player
<code>%valentines_top_kisses_(position)</code> | Displays Top 1-100 player
<code>%valentines_top_likes_(position)</code> | Displays Top 1-100 player

<code>%valentines_top_hugs_given_(position)</code> | Displays Top 1-100 player
<code>%valentines_top_hugs_likes_(position)</code> | Displays Top 1-100 player
<code>%valentines_top_hugs_kisses_(position)</code> | Displays Top 1-100 player
</template>
        </article>
      </main>
    </div>
    <script src="../js/wiki.js"></script>
  </body>
</html>
