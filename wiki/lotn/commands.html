          <h1>Commands</h1>
          <h2>Player's commands</h2>
          <template data-wiki-table>

Command | Aliases | Description | Permission
<code>/lotn</code> | <code>/legendsofthenorth</code>, <code>/legends</code> | Open main GUI | <code>lotn.use</code>
<code>/stats</code> | <code>/character</code> | Opens character stats  | <code>lotn.use</code>
<code>/attributes</code> | - | Opens attribute GUI  | <code>lotn.use</code>
<code>/skills</code> | <code>/perks</code> | Opens skill tree GUI  | <code>lotn.use</code>
<code>/journal</code> | - | Opens accepted quests GUI  | <code>lotn.use</code>
<code>/quests</code> | - | Opens quests GUI  | <code>lotn.use</code>
<code>/contracts</code> | - | Opens repeatable quests GUI  | <code>lotn.use</code>
<code>/codex</code> | - | Opens collection GUI  | <code>lotn.use</code>
<code>/fishdex</code> | - | Opens fish collection GUI | <code>lotn.use</code>
<code>/enchants</code> | - | Opens enchants GUI | <code>lotn.use</code>
<code>/factions</code> | <code>/reputation</code> | Opens factions GUI  | <code>lotn.use</code>
<code>/alchemy</code> | - | Opens alchemy GUI  | <code>lotn.use</code>
<code>/fish</code> | - | Opens fish-selling GUI  | <code>lotn.use</code>
<code>/sellfish</code> | <code>/sellall</code> | Sells LOTN fish  | <code>lotn.use</code>
<code>/travel</code> | <code>/fasttravel</code> | Opens travel GUI  | <code>lotn.use</code>
<code>/lotn help</code> | - | Shows LOTN commands  | <code>lotn.use</code>

</template>
          <h2>Administrative commands</h2>
          <template data-wiki-table>

Command  | Description | Permission
<code>/lotn help</code> | - | <code>lotn.admin</code>
<code>/lotn reload</code> | Reloads configs | <code>lotn.admin</code>
<code>/lotn givexp (player) (amount) </code> | Gives XP to a player | <code>lotn.admin</code>
<code>/lotn givepoints (player) (amount)</code> | Gives perk points to a player | <code>lotn.admin</code>
<code>/lotn unlockenchant (player) (enchant)</code> | Unlocks enchant for a player | <code>lotn.admin</code>
<code>/lotn character setname (player) (name)</code> | Sets player's character name | <code>lotn.admin.character</code>
<code>/lotn character reset (palyer)</code> | Clears character identity, preserves progression | <code>lotn.admin.character</code>
<code>/lotn character info (player)</code> | Shows player's character info | <code>lotn.admin.character</code>
<code>/lotn character complete (player) </code> | Completes creation using stored or Minecraft name | <code>lotn.admin.character</code>

</template>

          <h2>Early Access commands</h2>
          <template data-wiki-table>

Command  | Description
<code>/lotnea help</code> | Shows testing commands | - |
<code>/lotnea maxpoints</code> | Adds 1000 points to sender | - |
<code>/lotnea maxupgrades</code> | Adds 1000 upgrade points to sender | - |
<code>/lotnea unlockall</code> | Unlocks every perk for which requirements are currently met | - |
<code>/lotnea unlockallforce</code> | Maxes every configured perk | - |
<code>/lotnea resetnodes</code> | Removes every perk and legacy skill-tree node | - |
<code>/lotnea maxlevel</code> | Sets enabled skills to max level | - |
<code>/lotnea unlockallenchants</code> | Unlocks all enchants | - |
<code>/lotnea menu</code> | Opens skill-tree menu | - |
<code>/lotnea resetall</code> | Resets all progress, preserving quests and collections | - |
<code>/lotnea breakleg (player)</code> | Breaks player's leg | <code>lotn.admin.breakleg</code> |
<code>/lotnea healleg (player)</code> | Heals player's leg | <code>lotn.admin.healleg</code> |

</template>
